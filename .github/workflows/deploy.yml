name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run test
        env:
          TESTING: "1"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          APP_NAME: TaskManager
          APP_VERSION: 1.0.0
          DEBUG: False
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_SERVER: smtp.gmail.com
          MAIL_PORT: 587
          REDIS_URL: ${{ secrets.REDIS_URL }}
          ALLOWED_ORIGINS: "http://localhost:5173"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SQS_QUEUE_URL: ${{ secrets.SQS_QUEUE_URL }}
        run: pytest --cov=app --cov-report=term-missing -v

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true 
          tags: ${{ secrets.DOCKER_USERNAME }}/taskmanager-backend:latest
        
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend:latest
          build-args: |
            VITE_API_URL=http://172.31.42.69:8000

  migrate:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python 
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          APP_NAME: TaskManager
          APP_VERSION: 1.0.0
          DEBUG: False
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_SERVER: smtp.gmail.com
          MAIL_PORT: 587
          REDIS_URL: ${{ secrets.REDIS_URL }}
          ALLOWED_ORIGINS: "http://localhost:5173"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SQS_QUEUE_URL: ${{ secrets.SQS_QUEUE_URL }}
        run: |
          alembic upgrade head
  
  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/app || git clone https://github.com/sharanzzgit/taskmanager.git ~/app
            cd ~/app
            git pull origin main
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > ~/app/.env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> ~/app/.env
            echo "ALGORITHM=HS256" >> ~/app/.env
            echo "ACCESS_TOKEN_EXPIRE_MINUTES=30" >> ~/app/.env
            echo "REFRESH_TOKEN_EXPIRE_DAYS=7" >> ~/app/.env
            echo "APP_NAME=TaskManager" >> ~/app/.env
            echo "APP_VERSION=1.0.0" >> ~/app/.env
            echo "DEBUG=False" >> ~/app/.env
            echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> ~/app/.env
            echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> ~/app/.env
            echo "MAIL_FROM=${{ secrets.MAIL_FROM }}" >> ~/app/.env
            echo "MAIL_SERVER=smtp.gmail.com" >> ~/app/.env
            echo "MAIL_PORT=587" >> ~/app/.env
            echo "REDIS_URL=${{ secrets.REDIS_URL }}" >> ~/app/.env
            echo "ALLOWED_ORIGINS=http://localhost:5173,http://172.31.42.69" >> ~/app/.env
            echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/app/.env
            echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/app/.env
            echo "SQS_QUEUE_URL=${{ secrets.SQS_QUEUE_URL }}" >> ~/app/.env
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/taskmanager-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/taskmanager-frontend:latest
            docker-compose down
            docker-compose up -d